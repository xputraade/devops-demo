input {
  jdbc {
    jdbc_driver_class => "org.postgresql.Driver"
    jdbc_connection_string => "jdbc:postgresql://postgres:5432/appdb"
    jdbc_user => "postgres"
    jdbc_password => "postgres"
    schedule => "* * * * *"
    statement => "
      SELECT
        id,
        title,
        description,
        customer_name,
        customer_email,
        status,
        priority,
        assigned_agent_id,
        created_at,
        updated_at
      FROM tickets
    "
  }

  jdbc {
    jdbc_driver_class => "org.postgresql.Driver"
    jdbc_connection_string => "jdbc:postgresql://postgres:5432/appdb"
    jdbc_user => "postgres"
    jdbc_password => "postgres"
    schedule => "* * * * *"
    statement => "
      SELECT
        id,
        ticket_id,
        author_name,
        comment,
        created_at
      FROM ticket_comments
    "
    add_field => { "document_type" => "ticket_comment" }
  }
}

filter {
  if ![document_type] {
    mutate {
      add_field => { "document_type" => "ticket" }
    }
  }
}

output {
  if [document_type] == "ticket" {
    elasticsearch {
      hosts => ["https://elasticsearch-master:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      ssl => true
      ssl_certificate_verification => false
      index => "tickets"
      document_id => "%{id}"
    }
  }

  if [document_type] == "ticket_comment" {
    elasticsearch {
      hosts => ["https://elasticsearch-master:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      ssl => true
      ssl_certificate_verification => false
      index => "ticket-comments"
      document_id => "%{id}"
    }
  }

  stdout { codec => rubydebug }
}
